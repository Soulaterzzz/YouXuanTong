<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安心选 - 登录</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      width: 420px;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .login-header h1 {
      font-size: 32px;
      color: #333;
      margin-bottom: 8px;
    }
    .login-header p {
      font-size: 14px;
      color: #999;
    }
    .login-tabs {
      display: flex;
      margin-bottom: 30px;
      border-bottom: 2px solid #eee;
    }
    .login-tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 16px;
      color: #666;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.3s;
    }
    .login-tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    .form-item {
      margin-bottom: 20px;
    }
    .form-item label {
      display: block;
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    .form-item input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }
    .form-item input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .form-item .error-msg {
      color: #f56c6c;
      font-size: 12px;
      margin-top: 6px;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #999;
    }
    .register-link a {
      color: #667eea;
      text-decoration: none;
      cursor: pointer;
    }
    .admin-hint {
      text-align: center;
      margin-top: 20px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
    }
    .admin-hint strong {
      color: #667eea;
    }
    .el-message {
      top: 20px !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-container">
      <div class="login-header">
        <h1>安心选</h1>
        <p>保险服务平台</p>
      </div>
      
      <div class="login-tabs">
        <div class="login-tab" :class="{ active: activeTab === 'login' }" @click="activeTab = 'login'">登录</div>
        <div class="login-tab" :class="{ active: activeTab === 'register' }" @click="activeTab = 'register'">注册</div>
      </div>

      <!-- 登录表单 -->
      <form v-if="activeTab === 'login'" @submit.prevent="handleLogin">
        <div class="form-item">
          <label>用户名</label>
          <input type="text" v-model="loginForm.username" placeholder="请输入用户名" required>
        </div>
        <div class="form-item">
          <label>密码</label>
          <input type="password" v-model="loginForm.password" placeholder="请输入密码" required>
        </div>
        <div class="form-item" v-if="loginError">
          <div class="error-msg">{{ loginError }}</div>
        </div>
        <button type="submit" class="login-btn" :disabled="loginLoading">
          {{ loginLoading ? '登录中...' : '登录' }}
        </button>
      </form>

      <!-- 注册表单 -->
      <form v-else @submit.prevent="handleRegister">
        <div class="form-item">
          <label>用户名</label>
          <input type="text" v-model="registerForm.username" placeholder="请输入用户名" required>
        </div>
        <div class="form-item">
          <label>密码</label>
          <input type="password" v-model="registerForm.password" placeholder="请输入密码" required>
        </div>
        <div class="form-item">
          <label>确认密码</label>
          <input type="password" v-model="registerForm.confirmPassword" placeholder="请再次输入密码" required>
        </div>
        <div class="form-item">
          <label>真实姓名</label>
          <input type="text" v-model="registerForm.realName" placeholder="请输入真实姓名">
        </div>
        <div class="form-item">
          <label>手机号</label>
          <input type="tel" v-model="registerForm.mobile" placeholder="请输入手机号">
        </div>
        <div class="form-item">
          <label>邮箱</label>
          <input type="email" v-model="registerForm.email" placeholder="请输入邮箱">
        </div>
        <div class="form-item" v-if="registerError">
          <div class="error-msg">{{ registerError }}</div>
        </div>
        <button type="submit" class="login-btn" :disabled="registerLoading">
          {{ registerLoading ? '注册中...' : '注册' }}
        </button>
      </form>

      <div class="register-link" v-if="activeTab === 'login'">
        还没有账号？<a @click="activeTab = 'register'">立即注册</a>
      </div>
      <div class="register-link" v-else>
        已有账号？<a @click="activeTab = 'login'">立即登录</a>
      </div>

      <div class="admin-hint" v-if="activeTab === 'login'">
        <p>管理员账号：<strong>admin</strong> / <strong>admin111</strong></p>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script>
    const { createApp, ref, reactive } = Vue

    const app = createApp({
      setup() {
        const activeTab = ref('login')
        const loginLoading = ref(false)
        const registerLoading = ref(false)
        const loginError = ref('')
        const registerError = ref('')

        const loginForm = reactive({
          username: '',
          password: ''
        })

        const registerForm = reactive({
          username: '',
          password: '',
          confirmPassword: '',
          realName: '',
          mobile: '',
          email: ''
        })

        const handleLogin = async () => {
          loginError.value = ''
          loginLoading.value = true

          try {
            const response = await axios.post('/auth/login', loginForm)
            if (response.data.code === 200) {
              const data = response.data.data
              sessionStorage.setItem('userType', data.userType)
              sessionStorage.setItem('username', data.username)
              sessionStorage.setItem('isLoggedIn', 'true')
              
              ElementPlus.ElMessage.success('登录成功')
              
              setTimeout(() => {
                if (data.userType === 'ADMIN') {
                  window.location.href = '/admin.html'
                } else {
                  window.location.href = '/'
                }
              }, 500)
            } else {
              loginError.value = response.data.message || '登录失败'
            }
          } catch (error) {
            loginError.value = error.response?.data?.message || '网络错误，请稍后重试'
          } finally {
            loginLoading.value = false
          }
        }

        const handleRegister = async () => {
          registerError.value = ''
          
          if (registerForm.password !== registerForm.confirmPassword) {
            registerError.value = '两次输入的密码不一致'
            return
          }

          if (registerForm.password.length < 6) {
            registerError.value = '密码长度不能少于6位'
            return
          }

          registerLoading.value = true

          try {
            const response = await axios.post('/auth/register', {
              username: registerForm.username,
              password: registerForm.password,
              realName: registerForm.realName,
              mobile: registerForm.mobile,
              email: registerForm.email
            })
            if (response.data.code === 200) {
              ElementPlus.ElMessage.success('注册成功，请登录')
              activeTab.value = 'login'
              loginForm.username = registerForm.username
              loginForm.password = ''
              registerForm.password = ''
              registerForm.confirmPassword = ''
            } else {
              registerError.value = response.data.message || '注册失败'
            }
          } catch (error) {
            registerError.value = error.response?.data?.message || '网络错误，请稍后重试'
          } finally {
            registerLoading.value = false
          }
        }

        return {
          activeTab,
          loginLoading,
          registerLoading,
          loginError,
          registerError,
          loginForm,
          registerForm,
          handleLogin,
          handleRegister
        }
      }
    })

    app.use(ElementPlus)
    app.mount('#app')
  </script>
</body>
</html>
