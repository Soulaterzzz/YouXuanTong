name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ytbx-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    needs: [build-test]
    if: success() || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Write deployment env file
        run: |
          APP_PORT_VALUE="${{ vars.YTBX_APP_PORT }}"
          HOST_UPLOAD_DIR_VALUE="${{ vars.YTBX_HOST_UPLOAD_DIR }}"
          MYSQL_DATABASE_VALUE="${{ vars.YTBX_MYSQL_DATABASE }}"
          MYSQL_USER_VALUE="${{ vars.YTBX_MYSQL_USER }}"
          MYSQL_PASSWORD_VALUE="${{ secrets.YTBX_MYSQL_PASSWORD }}"
          MYSQL_ROOT_PASSWORD_VALUE="${{ secrets.YTBX_MYSQL_ROOT_PASSWORD }}"
          PRODUCT_IMAGE_PATH_VALUE="${{ vars.YTBX_PRODUCT_IMAGE_PATH }}"
          MAX_FILE_SIZE_VALUE="${{ vars.YTBX_MAX_FILE_SIZE }}"
          ALLOWED_EXTENSIONS_VALUE="${{ vars.YTBX_ALLOWED_EXTENSIONS }}"
          SQL_INIT_MODE_VALUE="${{ vars.YTBX_SQL_INIT_MODE }}"

          APP_PORT_VALUE="${APP_PORT_VALUE:-8080}"
          HOST_UPLOAD_DIR_VALUE="${HOST_UPLOAD_DIR_VALUE:-/data/ytbx/uploads}"
          MYSQL_DATABASE_VALUE="${MYSQL_DATABASE_VALUE:-ytbx}"
          MYSQL_USER_VALUE="${MYSQL_USER_VALUE:-ytbx}"
          PRODUCT_IMAGE_PATH_VALUE="${PRODUCT_IMAGE_PATH_VALUE:-products}"
          MAX_FILE_SIZE_VALUE="${MAX_FILE_SIZE_VALUE:-10485760}"
          ALLOWED_EXTENSIONS_VALUE="${ALLOWED_EXTENSIONS_VALUE:-jpg,jpeg,png,gif,webp}"
          SQL_INIT_MODE_VALUE="${SQL_INIT_MODE_VALUE:-never}"

          if [ -z "$MYSQL_PASSWORD_VALUE" ] || [ -z "$MYSQL_ROOT_PASSWORD_VALUE" ]; then
            echo "缺少必需的 GitHub Secrets：YTBX_MYSQL_PASSWORD / YTBX_MYSQL_ROOT_PASSWORD" >&2
            exit 1
          fi

          cat > deploy/.env <<EOF_ENV
          APP_PORT=${APP_PORT_VALUE}
          HOST_UPLOAD_DIR=${HOST_UPLOAD_DIR_VALUE}
          MYSQL_DATABASE=${MYSQL_DATABASE_VALUE}
          MYSQL_USER=${MYSQL_USER_VALUE}
          MYSQL_PASSWORD=${MYSQL_PASSWORD_VALUE}
          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD_VALUE}
          PRODUCT_IMAGE_PATH=${PRODUCT_IMAGE_PATH_VALUE}
          MAX_FILE_SIZE=${MAX_FILE_SIZE_VALUE}
          ALLOWED_EXTENSIONS=${ALLOWED_EXTENSIONS_VALUE}
          YTBX_SQL_INIT_MODE=${SQL_INIT_MODE_VALUE}
          EOF_ENV

      - name: Prepare upload directory
        run: |
          HOST_UPLOAD_DIR_VALUE="${{ vars.YTBX_HOST_UPLOAD_DIR }}"
          HOST_UPLOAD_DIR_VALUE="${HOST_UPLOAD_DIR_VALUE:-/data/ytbx/uploads}"
          mkdir -p "$HOST_UPLOAD_DIR_VALUE/templates"

      - name: Tag current image for rollback
        run: |
          if docker image inspect ytbx-app:latest >/dev/null 2>&1; then
            docker tag ytbx-app:latest ytbx-app:rollback
            echo "ROLLBACK_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "已标记当前镜像为 ytbx-app:rollback"
          else
            echo "ROLLBACK_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "首次部署，无回滚镜像"
          fi

      - name: Deploy application
        id: deploy
        run: |
          START_TIME=$(date +%s)
          echo "::group::构建并启动服务"

          if docker compose --env-file deploy/.env -f deploy/docker-compose.yml up -d --build --remove-orphans; then
            END_TIME=$(date +%s)
            DEPLOY_DURATION=$((END_TIME - START_TIME))
            echo "DEPLOY_DURATION=${DEPLOY_DURATION}" >> "$GITHUB_ENV"
            echo "部署构建耗时: ${DEPLOY_DURATION} 秒"
          else
            echo "::error::部署构建失败"
            exit 1
          fi

          echo "::endgroup::"

      - name: Health check
        id: health
        if: steps.deploy.outcome == 'success'
        run: |
          source deploy/.env
          APP_PORT="${APP_PORT:-8080}"
          HEALTH_URL="http://127.0.0.1:${APP_PORT}"
          MAX_ATTEMPTS=30
          ATTEMPT=0

          echo "等待服务启动..."
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if curl -sf "$HEALTH_URL" >/dev/null 2>&1; then
              echo "服务健康检查通过 (耗时 $((ATTEMPT * 2)) 秒)"
              exit 0
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "等待中... ($ATTEMPT/$MAX_ATTEMPTS)"
            sleep 2
          done

          echo "::error::服务健康检查超时"
          exit 1

      - name: Cleanup old images
        if: steps.health.outcome == 'success'
        run: docker image prune -f

      - name: Deployment summary
        if: steps.health.outcome == 'success'
        run: |
          echo "========================================="
          echo "部署成功"
          echo "========================================="
          echo "提交: ${{ github.sha }}"
          echo "分支: ${{ github.ref_name }}"
          echo "触发: ${{ github.event_name }}"
          echo "部署构建耗时: ${DEPLOY_DURATION} 秒"
          echo "========================================="

      - name: Rollback on failure
        if: failure() && env.ROLLBACK_AVAILABLE == 'true'
        run: |
          echo "::group::回滚到上一版本"
          if docker compose --env-file deploy/.env -f deploy/docker-compose.yml up -d ytbx-app \
              && docker tag ytbx-app:rollback ytbx-app:latest; then
            echo "回滚成功，已恢复到上一版本"
          else
            echo "::error::回滚失败，请手动检查"
          fi
          echo "::endgroup::"
