name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ytbx-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Write deployment env file
        shell: bash
        run: |
          set -euo pipefail

          quote_env_value() {
            printf "'%s'" "$(printf '%s' "$1" | sed "s/'/'\"'\"'/g")"
          }

          APP_PORT_VALUE="${{ vars.YTBX_APP_PORT }}"
          HOST_UPLOAD_DIR_VALUE="${{ vars.YTBX_HOST_UPLOAD_DIR }}"
          USE_EXTERNAL_DB_VALUE="${{ vars.YTBX_USE_EXTERNAL_DB }}"
          MYSQL_HOST_VALUE="${{ vars.YTBX_MYSQL_HOST }}"
          MYSQL_PORT_VALUE="${{ vars.YTBX_MYSQL_PORT }}"
          MYSQL_DATABASE_VALUE="${{ vars.YTBX_MYSQL_DATABASE }}"
          MYSQL_USER_VALUE="${{ vars.YTBX_MYSQL_USER }}"
          MYSQL_PASSWORD_VALUE="${{ secrets.YTBX_MYSQL_PASSWORD }}"
          MYSQL_ROOT_PASSWORD_VALUE="${{ secrets.YTBX_MYSQL_ROOT_PASSWORD }}"
          AUTH_TOKEN_SECRET_VALUE="${{ secrets.YTBX_AUTH_TOKEN_SECRET }}"
          CORS_ALLOWED_ORIGINS_VALUE="${{ vars.YTBX_CORS_ALLOWED_ORIGINS }}"
          PRODUCT_IMAGE_PATH_VALUE="${{ vars.YTBX_PRODUCT_IMAGE_PATH }}"
          MAX_FILE_SIZE_VALUE="${{ vars.YTBX_MAX_FILE_SIZE }}"
          ALLOWED_EXTENSIONS_VALUE="${{ vars.YTBX_ALLOWED_EXTENSIONS }}"
          SQL_INIT_MODE_VALUE="${{ vars.YTBX_SQL_INIT_MODE }}"
          ENABLE_NGINX_VALUE="${{ vars.YTBX_ENABLE_NGINX }}"
          SERVER_NAME_VALUE="${{ vars.YTBX_SERVER_NAME }}"

          APP_PORT_VALUE="${APP_PORT_VALUE:-8080}"
          HOST_UPLOAD_DIR_VALUE="${HOST_UPLOAD_DIR_VALUE:-/data/ytbx/uploads}"
          USE_EXTERNAL_DB_VALUE="${USE_EXTERNAL_DB_VALUE:-1}"
          MYSQL_PORT_VALUE="${MYSQL_PORT_VALUE:-3306}"
          MYSQL_DATABASE_VALUE="${MYSQL_DATABASE_VALUE:-ytbx}"
          MYSQL_USER_VALUE="${MYSQL_USER_VALUE:-ytbx}"
          PRODUCT_IMAGE_PATH_VALUE="${PRODUCT_IMAGE_PATH_VALUE:-products}"
          MAX_FILE_SIZE_VALUE="${MAX_FILE_SIZE_VALUE:-10485760}"
          ALLOWED_EXTENSIONS_VALUE="${ALLOWED_EXTENSIONS_VALUE:-jpg,jpeg,png,gif,webp}"
          SQL_INIT_MODE_VALUE="${SQL_INIT_MODE_VALUE:-never}"
          ENABLE_NGINX_VALUE="${ENABLE_NGINX_VALUE:-1}"
          SERVER_NAME_VALUE="${SERVER_NAME_VALUE:-_}"
          CORS_ALLOWED_ORIGINS_VALUE="${CORS_ALLOWED_ORIGINS_VALUE:-http://localhost:5173,http://127.0.0.1:5173}"

          if [[ "${USE_EXTERNAL_DB_VALUE}" == "1" ]]; then
            if [[ -z "${MYSQL_HOST_VALUE}" ]]; then
              echo "USE_EXTERNAL_DB=1 时必须提供 YTBX_MYSQL_HOST" >&2
              exit 1
            fi
            if [[ -z "${MYSQL_PASSWORD_VALUE}" ]]; then
              echo "缺少必需的 GitHub Secret：YTBX_MYSQL_PASSWORD" >&2
              exit 1
            fi
            MYSQL_ROOT_PASSWORD_VALUE=""
          else
            MYSQL_HOST_VALUE="127.0.0.1"
            if [[ -z "${MYSQL_PASSWORD_VALUE}" || -z "${MYSQL_ROOT_PASSWORD_VALUE}" ]]; then
              echo "USE_EXTERNAL_DB=0 时必须提供 YTBX_MYSQL_PASSWORD 和 YTBX_MYSQL_ROOT_PASSWORD" >&2
              exit 1
            fi
          fi

          if [[ -z "${AUTH_TOKEN_SECRET_VALUE}" ]]; then
            echo "缺少必需的 GitHub Secret：YTBX_AUTH_TOKEN_SECRET" >&2
            exit 1
          fi

          MYSQL_URL_VALUE="jdbc:mysql://${MYSQL_HOST_VALUE}:${MYSQL_PORT_VALUE}/${MYSQL_DATABASE_VALUE}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"

          cat > deploy/.env <<EOF_ENV
          APP_PORT=$(quote_env_value "${APP_PORT_VALUE}")
          HOST_UPLOAD_DIR=$(quote_env_value "${HOST_UPLOAD_DIR_VALUE}")
          USE_EXTERNAL_DB=$(quote_env_value "${USE_EXTERNAL_DB_VALUE}")
          MYSQL_HOST=$(quote_env_value "${MYSQL_HOST_VALUE}")
          MYSQL_PORT=$(quote_env_value "${MYSQL_PORT_VALUE}")
          MYSQL_DATABASE=$(quote_env_value "${MYSQL_DATABASE_VALUE}")
          MYSQL_USER=$(quote_env_value "${MYSQL_USER_VALUE}")
          MYSQL_PASSWORD=$(quote_env_value "${MYSQL_PASSWORD_VALUE}")
          MYSQL_ROOT_PASSWORD=$(quote_env_value "${MYSQL_ROOT_PASSWORD_VALUE}")
          MYSQL_URL=$(quote_env_value "${MYSQL_URL_VALUE}")
          AUTH_TOKEN_SECRET=$(quote_env_value "${AUTH_TOKEN_SECRET_VALUE}")
          CORS_ALLOWED_ORIGINS=$(quote_env_value "${CORS_ALLOWED_ORIGINS_VALUE}")
          PRODUCT_IMAGE_PATH=$(quote_env_value "${PRODUCT_IMAGE_PATH_VALUE}")
          MAX_FILE_SIZE=$(quote_env_value "${MAX_FILE_SIZE_VALUE}")
          ALLOWED_EXTENSIONS=$(quote_env_value "${ALLOWED_EXTENSIONS_VALUE}")
          YTBX_SQL_INIT_MODE=$(quote_env_value "${SQL_INIT_MODE_VALUE}")
          ENABLE_NGINX=$(quote_env_value "${ENABLE_NGINX_VALUE}")
          SERVER_NAME=$(quote_env_value "${SERVER_NAME_VALUE}")
          EOF_ENV

          chmod 600 deploy/.env

      - name: Prepare upload directory
        shell: bash
        run: |
          set -euo pipefail
          HOST_UPLOAD_DIR_VALUE="${{ vars.YTBX_HOST_UPLOAD_DIR }}"
          HOST_UPLOAD_DIR_VALUE="${HOST_UPLOAD_DIR_VALUE:-/data/ytbx/uploads}"
          sudo mkdir -p "${HOST_UPLOAD_DIR_VALUE}/templates"

      - name: Deploy application
        shell: bash
        run: |
          set -euo pipefail
          sudo bash deploy/server-bootstrap-ubuntu.sh deploy
