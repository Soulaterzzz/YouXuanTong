apiVersion: apps/v1
kind: Deployment
metadata:
  name: ytbx-app
  namespace: default
  labels:
    app: ytbx
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ytbx
      tier: backend
  template:
    metadata:
      labels:
        app: ytbx
        tier: backend
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL..."
              until nc -z ${MYSQL_HOST:-mysql} ${MYSQL_PORT:-3306}; do
                echo "MySQL is not ready, waiting..."
                sleep 3
              done
              echo "MySQL is ready!"
          env:
            - name: MYSQL_HOST
              value: "${MYSQL_HOST:-mysql}"
            - name: MYSQL_PORT
              value: "${MYSQL_PORT:-3306}"
      containers:
        - name: ytbx-app
          image: ${IMAGE_NAME:-ytbx-app:latest}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx1024m"
            - name: MYSQL_URL
              value: jdbc:mysql://${MYSQL_HOST:-mysql}:${MYSQL_PORT:-3306}/${MYSQL_DATABASE:-ytbx}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
            - name: MYSQL_USERNAME
              value: ${MYSQL_USER:-ytbx}
            - name: MYSQL_PASSWORD
              value: ${MYSQL_PASSWORD}
            - name: FILE_STORAGE_PATH
              value: /data/ytbx/uploads
            - name: TEMPLATE_FILE_PATH
              value: /data/ytbx/uploads/templates
            - name: PRODUCT_IMAGE_PATH
              value: ${PRODUCT_IMAGE_PATH:-products}
            - name: MAX_FILE_SIZE
              value: "${MAX_FILE_SIZE:-10485760}"
            - name: ALLOWED_EXTENSIONS
              value: jpg,jpeg,png,gif,webp
            - name: YTBX_SQL_INIT_MODE
              value: "${YTBX_SQL_INIT_MODE:-never}"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: upload-data
              mountPath: /data/ytbx/uploads
      volumes:
        - name: upload-data
          persistentVolumeClaim:
            claimName: ytbx-uploads
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ytbx-uploads
  namespace: default
  labels:
    app: ytbx
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
