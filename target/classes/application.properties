spring.application.name=ytbx

ytbx.mock.enabled=${YTBX_MOCK_ENABLED:false}

spring.datasource.url=${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/ytbx?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:Zs20030118}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initialization-fail-timeout=0

spring.sql.init.mode=${YTBX_SQL_INIT_MODE:never}
spring.sql.init.schema-locations=classpath:sql/01-mvp-schema.sql
spring.sql.init.data-locations=classpath:sql/02-mvp-seed.sql

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

file.storage.upload-path=${FILE_STORAGE_PATH:${user.home}/ytbx/images}
file.storage.product-image-path=${PRODUCT_IMAGE_PATH:products}
file.storage.max-file-size=${MAX_FILE_SIZE:10485760}
file.storage.allowed-extensions=${ALLOWED_EXTENSIONS:jpg,jpeg,png,gif,webp}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
